name: Owner Guard

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  enforce-owner:
    runs-on: ubuntu-latest
    steps:
      - name: Verify repository owner
        run: |
          if [ "${{ github.repository_owner }}" != "liminal-loop" ]; then
            echo "This repository is restricted to owner liminal-loop."
            echo "Current owner: ${{ github.repository_owner }}"
            exit 1
          fi

      - name: Verify triggering actor
        run: |
          actor="${{ github.actor }}"
          event_name="${{ github.event_name }}"

          if [ "$actor" = "liminal-loop" ]; then
            exit 0
          fi

          if [ "$event_name" = "pull_request" ] && [ "$actor" = "dependabot[bot]" ]; then
            echo "Allowing Dependabot pull request actor."
            exit 0
          fi

          echo "Only liminal-loop is allowed to trigger repository workflows (except Dependabot PRs)."
          echo "Current actor: $actor"
          echo "Event: $event_name"
          exit 1

      - name: Verify commit author emails on push
        if: github.event_name == 'push'
        run: |
          bad_count="$(jq '[.commits[] | select(((.author.username // "") != "liminal-loop") and ((.author.username // "") != "dependabot[bot]") and ((.author.email // "") != "dev@bytemania.eu"))] | length' "$GITHUB_EVENT_PATH")"
          if [ "$bad_count" != "0" ]; then
            echo "Push contains commit(s) not authored by liminal-loop or dependabot[bot]."
            jq -r '.commits[] | "- " + .id + " by " + (.author.name // "unknown") + " (@" + (.author.username // "unknown") + ") <" + (.author.email // "unknown") + ">"' "$GITHUB_EVENT_PATH"
            exit 1
          fi
