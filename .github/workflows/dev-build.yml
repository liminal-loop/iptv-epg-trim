name: Build Dev Artifacts

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: dev-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-package:
    name: Build Python Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Build wheel and sdist
        run: uv build

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dev-main-package-${{ github.sha }}
          path: |
            dist/*.whl
            dist/*.tar.gz
          if-no-files-found: error
          retention-days: 14

  build-executables:
    name: Build Executable (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Build self-contained executable
        run: uv run --with pyinstaller python scripts/build_executable.py --clean --name epg-trim-dev

      - name: Upload executable artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dev-main-executable-${{ matrix.os }}-${{ github.sha }}
          path: dist/**
          if-no-files-found: error
          retention-days: 14

  build-executable-armv7:
    name: Build Executable (linux-armv7l)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build ARMv7 executable in emulated Raspberry Pi environment
        uses: pguyot/arm-runner-action@v2.6.5
        with:
          base_image: raspios_lite:2023-05-03
          cpu: cortex-a7
          bind_mount_repository: true
          shell: /bin/bash
          commands: |
            set -euo pipefail
            apt-get update
            apt-get install -y python3 python3-venv python3-pip python3-dev build-essential
            python3 -m venv .venv
            . .venv/bin/activate
            python -m pip install --upgrade pip
            python -m pip install pyinstaller requests lxml fastapi uvicorn apscheduler
            python scripts/build_executable.py --clean --name epg-trim-dev

      - name: Upload ARMv7 executable artifact
        uses: actions/upload-artifact@v7
        with:
          name: dev-main-executable-linux-armv7l-${{ github.sha }}
          path: dist/linux-armv7l/epg-trim-dev
          if-no-files-found: error
          retention-days: 14

  publish-dev-release:
    name: Publish Dev Release Assets
    runs-on: ubuntu-latest
    needs:
      - build-executables
      - build-executable-armv7
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Download Linux x64 artifact
        uses: actions/download-artifact@v5
        with:
          name: dev-main-executable-ubuntu-latest-${{ github.sha }}
          path: _artifacts/linux-x64

      - name: Download Windows artifact
        uses: actions/download-artifact@v5
        with:
          name: dev-main-executable-windows-latest-${{ github.sha }}
          path: _artifacts/windows

      - name: Download Linux armv7 artifact
        uses: actions/download-artifact@v5
        with:
          name: dev-main-executable-linux-armv7l-${{ github.sha }}
          path: _artifacts/linux-armv7l

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets

          cp "$(find _artifacts/linux-x64 -type f -name epg-trim-dev | head -n1)" release-assets/epg-trim-dev-linux-x86_64
          cp "$(find _artifacts/linux-armv7l -type f -name epg-trim-dev | head -n1)" release-assets/epg-trim-dev-linux-armv7l
          cp "$(find _artifacts/windows -type f -name epg-trim-dev.exe | head -n1)" release-assets/epg-trim-dev-windows-amd64.exe

      - name: Publish dev-latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-latest
          name: dev-latest
          body: |
            Latest development binaries from main.
            These assets are updated by CI on each successful push to main.
          prerelease: true
          make_latest: false
          overwrite_files: true
          files: |
            release-assets/epg-trim-dev-linux-x86_64
            release-assets/epg-trim-dev-linux-armv7l
            release-assets/epg-trim-dev-windows-amd64.exe
