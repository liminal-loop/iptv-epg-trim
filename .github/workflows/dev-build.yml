name: Build Dev Artifacts

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: dev-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-package:
    name: Build Python Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Build wheel and sdist
        run: uv build

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dev-main-package-${{ github.sha }}
          path: |
            dist/*.whl
            dist/*.tar.gz
          if-no-files-found: error
          retention-days: 14

  build-executables:
    name: Build Executable (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Build self-contained executable
        run: uv run --with pyinstaller python scripts/build_executable.py --clean --name epg-trim-dev

      - name: Upload executable artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dev-main-executable-${{ matrix.os }}-${{ github.sha }}
          path: dist/**
          if-no-files-found: error
          retention-days: 14
